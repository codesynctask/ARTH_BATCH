<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <h1 class="text-center text-2xl font-bold mt-8">Todo list</h1>
    <div class="border-2 w-[80vw] m-auto p-4 rounded-md">
      <div class="flex gap-4">
        <input
          type="text"
          placeholder="Task Name here"
          class="p-2 px-5 w-full"
        />
        <button
          class="border-2 p-2 px-5 rounded-md cursor-pointer active:scale-105 w-[200px] truncate"
        >
          Create task
        </button>
      </div>
    </div>
    <ul class="">
      <li class="flex justify-between item-center w-[80vw] m-auto p-4 rounded-md shadow-md">
        <div class=" flex justify-center items-center gap-4">
          <i class="ri-checkbox-blank-circle-line text-2xl"></i>
          <input readonly="true" type="text" name="" id="" value="Learn JS DOM" class="focus:border-none outline-none">
        </div>
        <div class="">
          <i id="edit" class="ri-pencil-line mr-4 border rounded-full cursor-pointer p-2 hover:border"></i>
          <i id="delete" class="ri-xrp-line border rounded-full cursor-pointer p-2 hover:border"></i>
        </div>
      </li>
    </ul>



    <script src="todo.js"></script>
  </body>
</html>
