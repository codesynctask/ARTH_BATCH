<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        button{
            width: 100px;
            padding: 10px 20px;
            margin: 5px 20px ;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>BG Color Changer - Level 1</h1>
    <div class="btn-group">
        <button onclick="document.body.style.backgroundColor='red'" >Red</button>
        <button onclick="document.body.style.backgroundColor='blue'">Blue</button>
        <button onclick="document.body.style.backgroundColor='green'">Green</button>
    </div>
</body>
</html>
