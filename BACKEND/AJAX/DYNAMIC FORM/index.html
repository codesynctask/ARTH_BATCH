<!DOCTYPE html>
<html>
<head>
    <title>Department Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background: #ffffff;
            padding: 30px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        select, input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #007bff;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Department Selection</h2>
    
    <form>
        <div class="form-group">
            <label for="employeeName">Employee Name</label>
            <input type="text" id="employeeName" placeholder="Enter name">
        </div>

        <div class="form-group">
            <label for="department">Select Department</label>
            <select id="department">
                <option value="">-- Choose Department --</option>
                <option value="HR">Human Resources</option>
                <option value="IT">Information Technology</option>
                <option value="FIN">Finance</option>
                <option value="MKT">Marketing</option>
                <option value="OPS">Operations</option>
            </select>
        </div>

        <button type="submit">Submit</button>
    </form>
</div>



<script src="dynamicDropDown.js"></script>
</body>
</html>
